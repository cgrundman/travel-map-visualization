<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 700" width="600" height="700">
  <defs>
    <!-- Flag Emblem -->
    <g id="emblem" fill="#00f">
      <path d="M-37.175342-94.368205a92.195445 92.195445 0 0 1 74.350684 0Q43-12 0-1q-43-11-37.175342-93.368205z"/>
<path id="a" d="m0-84.5 1.125 2.551443L3.897114-82.25 2.25-80l1.647114 2.25L1.125-78.051443 0-75.5l-1.125-2.551443-2.772114.301443L-2.25-80l-1.647114-2.25 2.772114.301443" fill="#ff0"/>
<use href="#a" x="-10.5" y="-14"/>
<use href="#a" x="10.5" y="-14"/>
<path d="m0-70 9 18 6-8 15 20a10 10 0 0 1-.384761 2.747211A46.400549 46.400549 0 0 1 0-6.090878A46.400549 46.400549 0 0 1-29.615239-37.252789 10 10 0 0 1-30-40l15-20 6 8z" fill="#fff"/>
<path id="b" d="M-29.615239-37.252789A10 10 0 0 0-15-31.339746a10 10 0 0 1 10 0 10 10 0 0 0 10 0 10 10 0 0 1 10 0A10 10 0 0 0 29.615239-37.252789L30-37.113249v7.320508a10 10 0 0 0-5 1.339746 10 10 0 0 1-10 0 10 10 0 0 0-10 0 10 10 0 0 1-10 0 10 10 0 0 0-10 0 10 10 0 0 1-10 0 10 10 0 0 0-5-1.339746v-7.320508"/> 
<use href="#b" y="5.773503"/>
<path d="M-40-93.066239a92.195445 92.195445 0 0 1 2.824658-1.301966l2.97064 47.448778A49.301041 49.301041 0 0 0 0-3.036262a49.301041 49.301041 0 0 0 34.204702-43.883164l2.97064-47.448778A92.195445 92.195445 0 0 1 40-93.066239L37.099526-46.73819A52.201533 52.201533 0 0 1 0 0a52.201533 52.201533 0 0 1-37.099526-46.738189z" fill="red"/>
    </g>
    <!-- Antique brass border -->
    <linearGradient id="antique-brass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e0c477"></stop>
      <stop offset="28%" stop-color="#9d7937"></stop>
      <stop offset="55%" stop-color="#d1ad5f"></stop>
      <stop offset="78%" stop-color="#755526"></stop>
      <stop offset="100%" stop-color="#c9a85d"></stop>
    </linearGradient>

    <!-- Dark inner edge -->
    <linearGradient id="dark-edge" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#40392f"></stop>
      <stop offset="100%" stop-color="#171916"></stop>
    </linearGradient>

    <!-- Main shield shape for clipping flags or artwork -->
    <clipPath id="shield-clip">
      <path d="
        M 118 112
        Q 118 90 140 90
        L 460 90
        Q 482 90 482 112
        L 482 350
        C 482 470 410 566 300 630
        C 190 566 118 470 118 350
        Z"></path>
    </clipPath>
  </defs>

  <!-- Complete shield group -->
  <g id="shield" filter="url(#shield-shadow)">

    <!-- Exterior brass frame -->
    <path id="shield-outer" d="
            M 104 100
            Q 104 74 132 74
            L 468 74
            Q 496 74 496 100
            L 496 354
            C 496 488 416 590 300 660
            C 184 590 104 488 104 354
            Z" fill="url(#antique-brass)" stroke="#3b2b16" stroke-width="0" stroke-linejoin="round"></path>

    <!-- Dark recessed border -->
    <path id="shield-recess" d="
            M 116 116
            Q 116 88 140 88
            L 460 88
            Q 484 88 484 110
            L 484 350
            C 484 474 409 568 300 631
            C 191 568 116 474 116 350
            Z" fill="#00000000" stroke="#dfc373" stroke-width="3" stroke-linejoin="round"></path>

    <!-- FLAG ARTWORK -->
  <g id="flag-art"
     clip-path="url(#shield-clip)"
     filter="url(#paper-grain)">

    <!-- 
    ACTIVE EXAMPLE: horizontal tricolor -->
    <rect x="118" y="90" width="365" height="180" fill="#fff"/>
    <rect x="118" y="270" width="365" height="180" fill="#00f"/>
    <rect x="118" y="450" width="365" height="180" fill="#f00"/>
    <use href="#emblem" transform="translate(250 390) scale(1.6)" />
    
  </g>
    
    <!-- Small corner ornaments -->
    <g fill="#d6b863" stroke="#4b351a" stroke-width="0">
      <circle cx="145" cy="122" r="5"></circle>
      <circle cx="455" cy="122" r="5"></circle>
    </g>

  </g>
</svg>