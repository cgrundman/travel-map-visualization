      <path d="
        M 118 112
        Q 118 90 140 90
        L 460 90
        Q 482 90 482 112
        L 482 350
        C 482 470 410 566 300 630
        C 190 566 118 470 118 350
        Z"/>
    </clipPath>
  </defs>
<!--Complete shield group-->
  <g id="shield" filter="url(#shield-shadow)">
<!--Exterior brass frame-->
    <path id="shield-outer" d="
            M 104 100
            Q 104 74 132 74
            L 468 74
            Q 496 74 496 100
            L 496 354
            C 496 488 416 590 300 660
            C 184 590 104 488 104 354
            Z" fill="url(#antique-brass)" stroke="#3b2b16" stroke-width="0" stroke-linejoin="round"/>
<!--Dark recessed border-->
    <path id="shield-recess" d="
            M 116 116
            Q 116 88 140 88
            L 460 88
            Q 484 88 484 110
            L 484 350
            C 484 474 409 568 300 631
            C 191 568 116 474 116 350
            Z" fill="#00000000" stroke="#dfc373" stroke-width="3" stroke-linejoin="round"/>
<!--FLAG ARTWORK-->
    <g id="flag-art" clip-path="url(#shield-clip)" filter="url(#paper-grain)">
<!--ACTIVE EXAMPLE: horizontal tricolor-->
      <rect x="118" y="90" width="365" height="180" fill="#ce1720"/>
      <rect x="118" y="270" width="365" height="180" fill="#ce1720"/>
      <rect x="118" y="450" width="365" height="180" fill="#007c30"/>
      <use href="#emblem" x="38" y="36" transform="scale(2.5)"/>
    </g>
<!--Small corner ornaments-->
    <g fill="#d6b863" stroke="#4b351a" stroke-width="0">
      <circle cx="145" cy="122" r="5"/>
      <circle cx="455" cy="122" r="5"/>
    </g>
  </g>
